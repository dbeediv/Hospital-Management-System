<center>
  <h3 class='alert alert-info' style="margin-bottom:0px;">Contact Us !</h3>
</center>
<br>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="contact-card">
        <h4 class="mb-4">Send a Message</h4>

        <div class="alert alert-success success-msg" id="successMsg">
          <strong>Thank you!</strong> Your message has been sent successfully.
        </div>

        <div class="form-group">
          <label>Name</label>
          <input type="text" class="form-control" id="name" placeholder="Your Name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" id="email" placeholder="Your Email">
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea class="form-control" id="message" rows="5" placeholder="Your Message"></textarea>
        </div>
        <button class="btn btn-primary btn-block" onclick="sendMessage()">Send Message</button>
      </div>
    </div>

    <div class="col-md-4 mt-4 mt-md-0">
      <div class="contact-card">
        <h4 class="mb-4">Get in Touch</h4>
        <p><i class="fa fa-github mr-2"></i> <a href="https://github.com/dbeediv" target="_blank">github.com/dbeediv</a></p>
        <p><i class="fa fa-envelope mr-2"></i> <a href="mailto:d.bharathi.v@gmail.com">d.bharathi.v@gmail.com</a></p>
        <p><i class="fa fa-phone mr-2"></i> +91 7019221501</p>
        <p><i class="fa fa-map-marker mr-2"></i> India</p>
        <hr>
        <h6>Follow Me</h6>
        <a href="https://facebook.com/abc/" class="btn btn-sm btn-primary mr-1 mb-1"><i class="fa fa-facebook"></i></a>
        <a href="https://instagram.com/_dbee_div_" class="btn btn-sm btn-danger mr-1 mb-1"><i class="fa fa-instagram"></i></a>
        <a href="https://twitter.com/abc" class="btn btn-sm btn-info mr-1 mb-1"><i class="fa fa-twitter"></i></a>
        <a href="https://api.whatsapp.com/send?phone=917019221501&text=Hello%20Divyabharathi." class="btn btn-sm btn-success mr-1 mb-1"><i class="fa fa-whatsapp"></i></a>
      </div>
    </div>
  </div>
</div>

<br><br>

<footer>
  <p>
    <a href="https://facebook.com/abc/" class="fa fa-facebook"></a>
    <a href="https://api.whatsapp.com/send?phone=917019221501&text=Hello%20Divyabharathi." class="fa fa-whatsapp"></a>

<script>
  function sendMessage() {
    var name = document.getElementById('name').value;
    var email = document.getElementById('email').value;
    var message = document.getElementById('message').value;
    if (name && email && message) {
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      document.getElementById('message').value = '';
    } else {
      alert('Please fill in all fields.');
    }
  }
</script>
